{% extends 'base.html' %}
{% block content %}
<div class="container mt-4">
    <div class="card p-4 shadow-lg">
        <h2 class="mb-4 text-white">Добавяне на нов риболовен кораб</h2>
        <form method="POST">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label text-white">Име на кораба *</label>
                    <input type="text" name="name" class="form-control" required>
                </div>
                </div>

            <div class="d-flex justify-content-end mt-4">
                <a href="/" class="btn btn-secondary me-2">Отказ</a>
                <button type="submit" class="btn btn-primary px-4">Запиши кораба</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
