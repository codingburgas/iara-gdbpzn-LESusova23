{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">Регистрация на нов риболовен кораб</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Име на кораба</label>
                            <label>
                                <input type="text" name="name" class="form-content form-control" required>
                            </label>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Международен номер</label>
                            <label>
                                <input type="text" name="int_number" class="form-control" required>
                            </label>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Име на собственика</label>
                            <label>
                                <input type="text" name="owner_name" class="form-control" required>
                            </label>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Име на капитана</label>
                            <label>
                                <input type="text" name="captain_name" class="form-control" required>
                            </label>
                        </div>
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="/" class="btn btn-secondary">Отказ</a>
                        <button type="submit" class="btn btn-success">Запази кораб</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
