{% extends 'base.html' %}
{% block content %}
<div class="container mt-4">
    <div class="card shadow-sm p-4">
        <h2 class="mb-4 text-primary">Издаване на любителски билет</h2>
        <form method="POST">

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label text-muted">Трите имена *</label>
                    <label>
                        <input type="text" name="holder_name" class="form-control" required>
                    </label>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label text-muted">ЕГН *</label>
                    <label>
                        <input type="text" name="egn" class="form-control" maxlength="10" required>
                    </label>
                </div>
            </div>

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label text-muted">Тип на лицето *</label>
                    <label for="ticket_type"></label><select name="ticket_type" id="ticket_type" class="form-select" onchange="checkTelk()" required>
                        <option value="Стандартен">Стандартен (над 14г.)</option>
                        <option value="Под 14г.">Под 14г. (Безплатен)</option>
                        <option value="Пенсионер">Пенсионер (Намаление)</option>
                        <option value="Инвалид">Инвалид (Безплатен)</option>
                    </select>
                </div>

                <div class="col-md-4 mb-3">
                    <label class="form-label text-muted">Срок на валидност *</label>
                    <label>
                        <select name="validity_period" class="form-select" required>
                            <option value="Седмичен">Седмичен</option>
                            <option value="Месечен">Месечен</option>
                            <option value="Годишен">Годишен</option>
                        </select>
                    </label>
                </div>

                <div class="col-md-4 mb-3">
                    <label class="form-label text-muted">Дата на издаване *</label>
                    <label>
                        <input type="date" name="issue_date" class="form-control" required>
                    </label>
                </div>
            </div>

            <div class="row" id="telk_row" style="display: none;">
                <div class="col-md-12 mb-3">
                    <label class="form-label text-info fw-bold">Номер на ТЕЛК решение *</label>
                    <label for="telk_number"></label><input type="text" name="telk_number" id="telk_number" class="form-control" placeholder="Въведете номер на решението...">
                </div>
            </div>

            <hr class="my-4">

            <div class="d-flex justify-content-end">
                <a href="/tickets" class="btn btn-secondary me-2">Отказ</a>
                <button type="submit" class="btn btn-primary px-4">Издай билет</button>
            </div>
        </form>
    </div>
</div>

<script>
    function checkTelk() {
        var type = document.getElementById("ticket_type").value;
        var telkRow = document.getElementById("telk_row");
        var telkInput = document.getElementById("telk_number");

        if (type === "Инвалид") {
            telkRow.style.display = "block";
            telkInput.required = true;
        } else {
            telkRow.style.display = "none";
            telkInput.required = false;
            telkInput.value = "";
        }
    }
</script>
{% endblock %}
