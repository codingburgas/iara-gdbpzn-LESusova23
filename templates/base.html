<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ИАРА - Информационна Система</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container">
        <a class="navbar-brand" href="/">Система ИАРА</a>
        <div class="d-flex">
            {% if current_user.is_authenticated %}
                <span class="text-white me-3 mt-2">Здравей, {{ current_user.username }}!</span>
                <a href="/logout" class="btn btn-outline-light">Изход</a>
            {% else %}
                <a href="/login" class="btn btn-outline-light me-2">Вход</a>
                <a href="/register" class="btn btn-outline-light">Регистрация</a>
            {% endif %}
        </div>
    </div>
</nav>

    <div class="container mt-5">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
